name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-compose:
    name: Docker Compose build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_IMAGE: node:22-alpine
      POSTGRES_IMAGE: postgres:16-alpine
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      STRAPI_INTERNAL_URL: http://cms:1337

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Validate CMS schemas
        shell: pwsh
        run: ./scripts/verify-cms-schemas.ps1

      - name: Build and start local stack
        run: docker compose up --build -d

      - name: Wait for website
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs web
          exit 1

      - name: Smoke test public endpoints
        shell: bash
        run: |
          curl -fsS http://localhost:3000 | grep -q "Commerce Toolbase"
          curl -fsS http://localhost:3000/categories | grep -q "Categories"
          curl -fsS http://localhost:3000/best | grep -q "Best"
          curl -fsS http://localhost:3000/compare | grep -q "Compare"
          curl -fsS http://localhost:3000/alternatives | grep -q "Alternatives"
          curl -fsS http://localhost:3000/methodology | grep -q "How Commerce Toolbase scores"
          curl -fsS http://localhost:3000/sitemap.xml | grep -q "<urlset"
          curl -fsS http://localhost:3000/robots.txt | grep -q "Sitemap"
          curl -fsS http://localhost:3000/feed.xml | grep -q "<rss"
          curl -fsS http://localhost:3000/manifest.webmanifest | grep -q "Commerce Toolbase"
          curl -fsSI http://localhost:3000/icon | grep -qi "content-type: image/png"
          curl -fsSI http://localhost:3000/apple-icon | grep -qi "content-type: image/png"
          curl -fsSI http://localhost:3000/opengraph-image | grep -qi "content-type: image/png"
          curl -fsSI http://localhost:3000/twitter-image | grep -qi "content-type: image/png"
          curl -fsS http://localhost:1337/admin | grep -q "Strapi"

      - name: Smoke test canonical URLs
        shell: bash
        run: |
          curl -fsS http://localhost:3000 | grep -q 'rel="canonical".*http://localhost:3000'
          curl -fsS http://localhost:3000/tools/klaviyo | grep -q 'rel="canonical".*http://localhost:3000/tools/klaviyo'
          curl -fsS http://localhost:3000/categories/email-marketing-tools | grep -q 'rel="canonical".*http://localhost:3000/categories/email-marketing-tools'
          curl -fsS http://localhost:3000/best/best-email-marketing-tools-for-ecommerce | grep -q 'rel="canonical".*http://localhost:3000/best/best-email-marketing-tools-for-ecommerce'
          curl -fsS http://localhost:3000/compare/klaviyo-vs-omnisend | grep -q 'rel="canonical".*http://localhost:3000/compare/klaviyo-vs-omnisend'
          curl -fsS http://localhost:3000/alternatives/klaviyo-alternatives | grep -q 'rel="canonical".*http://localhost:3000/alternatives/klaviyo-alternatives'

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v
